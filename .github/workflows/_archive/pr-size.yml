name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          configuration_path: ".github/pr-size-labeler.yml"
