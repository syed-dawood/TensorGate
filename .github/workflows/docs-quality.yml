name: Docs Quality

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !**/node_modules/**

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --verbose --no-progress --max-concurrency 8 --exclude-file .lycheeignore "./**/*.md"
