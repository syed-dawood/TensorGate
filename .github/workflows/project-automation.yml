name: Project Automation

on:
  issues:
    types: [opened, reopened, edited, labeled, unlabeled]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route-and-sync-project-fields:
    name: Route and sync project fields
    runs-on: ubuntu-latest
    if: ${{ secrets.TG_PROJECT_TOKEN != '' }}
    steps:
      - name: Add item and synchronize project fields
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TG_PROJECT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = context.payload.issue;
            const pr = context.payload.pull_request;
            const isIssueEvent = !!issue;
            const isPREvent = !!pr;
            const contentNodeId = isIssueEvent ? issue.node_id : pr.node_id;

            if (!contentNodeId) {
              core.warning("No issue/PR node ID found in payload. Nothing to sync.");
              return;
            }

            const labels = (isIssueEvent ? issue.labels : pr.labels || [])
              .map(l => typeof l === "string" ? l : l.name)
              .filter(Boolean);
            const labelSet = new Set(labels);

            const PROJECT_NUMBER = 1;

            const queryProject = `
              query($owner:String!, $number:Int!) {
                user(login:$owner) {
                  projectV2(number:$number) {
                    id
                    title
                    fields(first:50) {
                      nodes {
                        ... on ProjectV2Field { id name }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectResult = await github.graphql(queryProject, {
              owner,
              number: PROJECT_NUMBER
            });

            const project = projectResult?.user?.projectV2;
            if (!project) {
              core.setFailed(`Project v2 #${PROJECT_NUMBER} not found for user ${owner}.`);
              return;
            }

            const fields = project.fields.nodes || [];
            const findField = (name) => fields.find(f => f.name === name);
            const findOptionId = (fieldName, optionName) => {
              const field = findField(fieldName);
              if (!field || !field.options) return null;
              const option = field.options.find(o => o.name === optionName);
              return option?.id || null;
            };

            const addItemMutation = `
              mutation($projectId:ID!, $contentId:ID!) {
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                  item { id }
                }
              }
            `;

            let itemId = null;
            try {
              const addRes = await github.graphql(addItemMutation, {
                projectId: project.id,
                contentId: contentNodeId
              });
              itemId = addRes?.addProjectV2ItemById?.item?.id || null;
              core.info(`Added item to project with ID: ${itemId}`);
            } catch (err) {
              core.info(`Add-to-project likely already exists or is not addable: ${err.message}`);
            }

            if (!itemId) {
              const queryItems = `
                query($projectId:ID!) {
                  node(id:$projectId) {
                    ... on ProjectV2 {
                      items(first:100) {
                        nodes {
                          id
                          content {
                            __typename
                            ... on Issue { id }
                            ... on PullRequest { id }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const itemsRes = await github.graphql(queryItems, { projectId: project.id });
              const items = itemsRes?.node?.items?.nodes || [];
              const match = items.find(i => i?.content?.id === contentNodeId);
              itemId = match?.id || null;
            }

            if (!itemId) {
              core.setFailed("Could not determine project item ID for issue/PR.");
              return;
            }

            const setSingleSelect = async (fieldName, optionName) => {
              const field = findField(fieldName);
              const optionId = findOptionId(fieldName, optionName);
              if (!field || !optionId) {
                core.warning(`Skipping ${fieldName}=${optionName}: field/option not found.`);
                return;
              }

              const mutation = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;

              await github.graphql(mutation, {
                projectId: project.id,
                itemId,
                fieldId: field.id,
                optionId
              });
              core.info(`Set ${fieldName} -> ${optionName}`);
            };

            const sprintMap = [
              ["sprint:1", "Sprint 1: Proxy Mechanics"],
              ["sprint:2", "Sprint 2: Inference Engines"],
              ["sprint:3", "Sprint 3: Validation"]
            ];
            const priorityMap = [
              ["priority:critical", "Critical"],
              ["priority:high", "High"],
              ["priority:medium", "Medium"]
            ];
            const componentMap = [
              ["component:proxy", "Proxy (YARP)"],
              ["component:tokenizer", "Tokenizer"],
              ["component:inference", "Inference (ONNX)"],
              ["component:concurrency", "Concurrency"],
              ["component:validation", "Validation"],
              ["component:memory", "Memory"],
              ["component:ci-cd", "CI/CD"]
            ];
            const roleMap = [
              ["role:migrator", "Migrator"],
              ["role:validator", "Validator"],
              ["role:tester", "Tester"],
              ["role:orchestrator", "Orchestrator"]
            ];

            const pickOption = (pairs) => {
              for (const [label, option] of pairs) {
                if (labelSet.has(label)) return option;
              }
              return null;
            };

            // Keep new items in Todo unless maintainers move them.
            await setSingleSelect("Status", "Todo");

            const sprintOption = pickOption(sprintMap);
            const priorityOption = pickOption(priorityMap);
            const componentOption = pickOption(componentMap);
            const roleOption = pickOption(roleMap);

            if (sprintOption) await setSingleSelect("Sprint", sprintOption);
            if (priorityOption) await setSingleSelect("Priority", priorityOption);
            if (componentOption) await setSingleSelect("Component", componentOption);
            if (roleOption) await setSingleSelect("Role", roleOption);

  missing-project-token:
    name: Project token not configured
    runs-on: ubuntu-latest
    if: ${{ secrets.TG_PROJECT_TOKEN == '' }}
    steps:
      - name: Explain required secret
        run: |
          echo "TG_PROJECT_TOKEN is not configured."
          echo "Create a PAT with 'project' and 'repo' scopes and store it as repository secret TG_PROJECT_TOKEN."
