name: Project Automation

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    name: Add item to project board
    runs-on: ubuntu-latest
    if: ${{ secrets.TG_PROJECT_TOKEN != '' }}
    steps:
      - name: Add to TensorGate project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/syed-dawood/projects/1
          github-token: ${{ secrets.TG_PROJECT_TOKEN }}

  missing-project-token:
    name: Project token not configured
    runs-on: ubuntu-latest
    if: ${{ secrets.TG_PROJECT_TOKEN == '' }}
    steps:
      - name: Explain required secret
        run: |
          echo "TG_PROJECT_TOKEN is not configured."
          echo "Create a PAT with 'project' and 'repo' scopes and store it as repository secret TG_PROJECT_TOKEN."
