name: Project Automation

# COST FREEZE — automatic issue triggers disabled; run manually when needed.
on:
  workflow_dispatch:

concurrency:
  group: project-automation-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add_to_project:
    name: Add to TensorGate project
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/TensorGateLabs/projects/1
          github-token: ${{ secrets.TG_PROJECT_TOKEN }}

  infer_field_values:
    name: Infer field values from labels
    runs-on: ubuntu-latest
    outputs:
      content_id: ${{ steps.infer.outputs.content_id }}
      sprint: ${{ steps.infer.outputs.sprint }}
      priority: ${{ steps.infer.outputs.priority }}
      component: ${{ steps.infer.outputs.component }}
      role: ${{ steps.infer.outputs.role }}
    steps:
      - id: infer
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.TG_PROJECT_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const pr = context.payload.pull_request;
            const contentId = issue?.node_id || pr?.node_id || "";
            const labels = (issue?.labels || pr?.labels || [])
              .map(l => typeof l === "string" ? l : l.name)
              .filter(Boolean);
            const set = new Set(labels);

            const pick = (pairs) => {
              for (const [label, value] of pairs) {
                if (set.has(label)) return value;
              }
              return "";
            };

            const sprint = pick([
              ["sprint:1", "Sprint 1: Proxy Mechanics"],
              ["sprint:2", "Sprint 2: Inference Engines"],
              ["sprint:3", "Sprint 3: Validation"]
            ]);
            const priority = pick([
              ["priority:critical", "Critical"],
              ["priority:high", "High"],
              ["priority:medium", "Medium"]
            ]);
            const component = pick([
              ["component:proxy", "Proxy (YARP)"],
              ["component:tokenizer", "Tokenizer"],
              ["component:inference", "Inference (ONNX)"],
              ["component:concurrency", "Concurrency"],
              ["component:validation", "Validation"],
              ["component:memory", "Memory"],
              ["component:ci-cd", "CI/CD"]
            ]);
            const role = pick([
              ["role:migrator", "Migrator"],
              ["role:validator", "Validator"],
              ["role:tester", "Tester"],
              ["role:orchestrator", "Orchestrator"]
            ]);

            core.setOutput("content_id", contentId);
            core.setOutput("sprint", sprint);
            core.setOutput("priority", priority);
            core.setOutput("component", component);
            core.setOutput("role", role);

  set_status:
    name: Set project status Todo
    runs-on: ubuntu-latest
    needs: [add_to_project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' }}
    continue-on-error: true
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ secrets.TG_PROJECT_TOKEN }}
          organization: TensorGateLabs
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Status
          value: Todo

  set_sprint:
    name: Set sprint field
    runs-on: ubuntu-latest
    needs: [add_to_project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.sprint != '' }}
    continue-on-error: true
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ secrets.TG_PROJECT_TOKEN }}
          organization: TensorGateLabs
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Sprint
          value: ${{ needs.infer_field_values.outputs.sprint }}

  set_priority:
    name: Set priority field
    runs-on: ubuntu-latest
    needs: [add_to_project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.priority != '' }}
    continue-on-error: true
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ secrets.TG_PROJECT_TOKEN }}
          organization: TensorGateLabs
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Priority
          value: ${{ needs.infer_field_values.outputs.priority }}

  set_component:
    name: Set component field
    runs-on: ubuntu-latest
    needs: [add_to_project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.component != '' }}
    continue-on-error: true
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ secrets.TG_PROJECT_TOKEN }}
          organization: TensorGateLabs
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Component
          value: ${{ needs.infer_field_values.outputs.component }}

  set_role:
    name: Set role field
    runs-on: ubuntu-latest
    needs: [add_to_project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.role != '' }}
    continue-on-error: true
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ secrets.TG_PROJECT_TOKEN }}
          organization: TensorGateLabs
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Role
          value: ${{ needs.infer_field_values.outputs.role }}

  sync_notice:
    name: Project sync status notice
    runs-on: ubuntu-latest
    needs: [add_to_project, infer_field_values, set_status, set_sprint, set_priority, set_component, set_role]
    if: ${{ github.event_name == 'issues' && (needs.add_to_project.result == 'failure' || needs.set_status.result == 'failure' || needs.set_sprint.result == 'failure' || needs.set_priority.result == 'failure' || needs.set_component.result == 'failure' || needs.set_role.result == 'failure') }}
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.TG_PROJECT_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                "### Project Automation Notice",
                "",
                "Project field sync could not complete for this event.",
                "Please ensure `TG_PROJECT_TOKEN` is a valid PAT with `repo` and `project` scopes.",
                "Once updated, edit any label on this issue to re-trigger sync."
              ].join("\\n")
            });

