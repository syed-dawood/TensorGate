name: Project Automation

on:
  issues:
    types: [opened, reopened, edited, labeled, unlabeled]
  pull_request_target:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    name: Add to TensorGate project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/syed-dawood/projects/1
          github-token: ${{ github.token }}

  infer_field_values:
    name: Infer field values from labels
    runs-on: ubuntu-latest
    outputs:
      content_id: ${{ steps.infer.outputs.content_id }}
      sprint: ${{ steps.infer.outputs.sprint }}
      priority: ${{ steps.infer.outputs.priority }}
      component: ${{ steps.infer.outputs.component }}
      role: ${{ steps.infer.outputs.role }}
    steps:
      - id: infer
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issue = context.payload.issue;
            const pr = context.payload.pull_request;
            const contentId = issue?.node_id || pr?.node_id || "";
            const labels = (issue?.labels || pr?.labels || [])
              .map(l => typeof l === "string" ? l : l.name)
              .filter(Boolean);
            const set = new Set(labels);

            const pick = (pairs) => {
              for (const [label, value] of pairs) {
                if (set.has(label)) return value;
              }
              return "";
            };

            const sprint = pick([
              ["sprint:1", "Sprint 1: Proxy Mechanics"],
              ["sprint:2", "Sprint 2: Inference Engines"],
              ["sprint:3", "Sprint 3: Validation"]
            ]);
            const priority = pick([
              ["priority:critical", "Critical"],
              ["priority:high", "High"],
              ["priority:medium", "Medium"]
            ]);
            const component = pick([
              ["component:proxy", "Proxy (YARP)"],
              ["component:tokenizer", "Tokenizer"],
              ["component:inference", "Inference (ONNX)"],
              ["component:concurrency", "Concurrency"],
              ["component:validation", "Validation"],
              ["component:memory", "Memory"],
              ["component:ci-cd", "CI/CD"]
            ]);
            const role = pick([
              ["role:migrator", "Migrator"],
              ["role:validator", "Validator"],
              ["role:tester", "Tester"],
              ["role:orchestrator", "Orchestrator"]
            ]);

            core.setOutput("content_id", contentId);
            core.setOutput("sprint", sprint);
            core.setOutput("priority", priority);
            core.setOutput("component", component);
            core.setOutput("role", role);

  set_status:
    name: Set project status Todo
    runs-on: ubuntu-latest
    needs: [add-to-project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' }}
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ github.token }}
          organization: syed-dawood
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Status
          value: Todo

  set_sprint:
    name: Set sprint field
    runs-on: ubuntu-latest
    needs: [add-to-project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.sprint != '' }}
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ github.token }}
          organization: syed-dawood
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Sprint
          value: ${{ needs.infer_field_values.outputs.sprint }}

  set_priority:
    name: Set priority field
    runs-on: ubuntu-latest
    needs: [add-to-project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.priority != '' }}
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ github.token }}
          organization: syed-dawood
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Priority
          value: ${{ needs.infer_field_values.outputs.priority }}

  set_component:
    name: Set component field
    runs-on: ubuntu-latest
    needs: [add-to-project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.component != '' }}
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ github.token }}
          organization: syed-dawood
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Component
          value: ${{ needs.infer_field_values.outputs.component }}

  set_role:
    name: Set role field
    runs-on: ubuntu-latest
    needs: [add-to-project, infer_field_values]
    if: ${{ needs.infer_field_values.outputs.content_id != '' && needs.infer_field_values.outputs.role != '' }}
    steps:
      - uses: github/update-project-action@v4
        with:
          github_token: ${{ github.token }}
          organization: syed-dawood
          project_number: 1
          content_id: ${{ needs.infer_field_values.outputs.content_id }}
          field: Role
          value: ${{ needs.infer_field_values.outputs.role }}

