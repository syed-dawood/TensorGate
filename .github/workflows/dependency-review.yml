name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Explain non-blocking mode during bootstrap
        if: ${{ always() }}
        run: |
          echo "Dependency review is configured in non-blocking mode for bootstrap."
          echo "Once the repository dependency graph is fully supported for project manifests,"
          echo "set continue-on-error to false to enforce strict gating."
