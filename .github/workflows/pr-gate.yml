name: PR Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch naming convention
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          ACTOR: ${{ github.actor }}
        run: |
          if [[ "$ACTOR" == "dependabot[bot]" ]] || [[ "$BRANCH_NAME" =~ ^dependabot/ ]]; then
            echo "Dependabot branch detected, skipping naming enforcement."
            exit 0
          fi

          if [[ "$BRANCH_NAME" =~ ^feature/[0-9]+-[a-z0-9-]+$ ]] || \
             [[ "$BRANCH_NAME" =~ ^fix/[0-9]+-[a-z0-9-]+$ ]] || \
             [[ "$BRANCH_NAME" =~ ^refactor/[a-z0-9-]+$ ]] || \
             [[ "$BRANCH_NAME" =~ ^docs/[a-z0-9-]+$ ]] || \
             [[ "$BRANCH_NAME" =~ ^bench/[a-z0-9-]+$ ]]; then
            echo "Branch name '$BRANCH_NAME' is valid."
            exit 0
          fi

          echo "Invalid branch name: '$BRANCH_NAME'"
          echo "Expected one of:"
          echo "  - feature/<issue>-<short-desc>"
          echo "  - fix/<issue>-<short-desc>"
          echo "  - refactor/<short-desc>"
          echo "  - docs/<short-desc>"
          echo "  - bench/<short-desc>"
          exit 1

  conventional-pr-title:
    name: Validate Conventional PR Title
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce conventional commit-style PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            test
            bench
            docs
            ci
            chore
          requireScope: false

  readiness:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR metadata for human-authored changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const actor = context.actor || "";
            const body = pr.body || "";

            if (actor === "dependabot[bot]" || pr.head.ref.startsWith("dependabot/")) {
              core.info("Dependabot PR: skipping human metadata gate.");
              return;
            }

            const failures = [];

            const hasIssueLink =
              /closes\s+#\d+/i.test(body) ||
              /relates\s+to\s+#\d+/i.test(body) ||
              /fixes\s+#\d+/i.test(body);
            if (!hasIssueLink) {
              failures.push("PR body must include an issue link (e.g. `Closes #123` or `Relates to #123`).");
            }

            const hasTestingEvidence =
              /unit tests added\/updated/i.test(body) ||
              /integration tests added\/updated/i.test(body) ||
              /manual testing performed/i.test(body);
            if (!hasTestingEvidence) {
              failures.push("PR body should include testing evidence from the template checklist.");
            }

            if (failures.length > 0) {
              core.setFailed(`PR readiness gate failed:\n- ${failures.join("\n- ")}`);
            }
