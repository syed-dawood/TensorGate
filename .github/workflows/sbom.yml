name: Generate SBOM

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          output-file: "artifacts/tensorgate.spdx.json"
          format: spdx-json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: artifacts/tensorgate.spdx.json
          retention-days: 30
