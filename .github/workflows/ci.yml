name: CI

# COST FREEZE — automatic PR triggers disabled; run manually when needed.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-dotnet-workspace:
    name: Detect .NET Workspace
    runs-on: ubuntu-latest
    outputs:
      has_dotnet_workspace: ${{ steps.detect.outputs.has_dotnet_workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect solution or project files
        id: detect
        run: |
          if [ -n "$(find . -type f \( -name "*.sln" -o -name "*.csproj" \) -print -quit)" ]; then
            echo "has_dotnet_workspace=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dotnet_workspace=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-dotnet-workspace
    if: needs.detect-dotnet-workspace.outputs.has_dotnet_workspace == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**'
          retention-days: 30

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: detect-dotnet-workspace
    if: needs.detect-dotnet-workspace.outputs.has_dotnet_workspace == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  bootstrap-ok:
    name: Bootstrap CI Guard
    runs-on: ubuntu-latest
    needs: detect-dotnet-workspace
    if: needs.detect-dotnet-workspace.outputs.has_dotnet_workspace == 'false'
    steps:
      - name: Report bootstrap state
        run: |
          echo "No .sln or .csproj detected yet."
          echo "Build/test/format checks are intentionally skipped until project scaffolding exists."
