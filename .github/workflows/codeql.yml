name: CodeQL Security Analysis

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect-dotnet-workspace:
    name: Detect .NET Workspace
    runs-on: ubuntu-latest
    outputs:
      has_dotnet_workspace: ${{ steps.detect.outputs.has_dotnet_workspace }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect solution or project files
        id: detect
        run: |
          if [ -n "$(find . -type f \( -name "*.sln" -o -name "*.csproj" \) -print -quit)" ]; then
            echo "has_dotnet_workspace=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dotnet_workspace=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    needs: detect-dotnet-workspace
    if: needs.detect-dotnet-workspace.outputs.has_dotnet_workspace == 'true'
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Build
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  bootstrap-ok:
    name: Bootstrap CodeQL Guard
    runs-on: ubuntu-latest
    needs: detect-dotnet-workspace
    if: needs.detect-dotnet-workspace.outputs.has_dotnet_workspace == 'false'
    steps:
      - name: Report bootstrap state
        run: echo "No .NET workspace found yet; CodeQL C# analysis is deferred."
