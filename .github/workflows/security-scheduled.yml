name: Security Scheduled

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-dotnet-workspace:
    runs-on: ubuntu-latest
    outputs:
      has_dotnet_workspace: ${{ steps.detect.outputs.has_dotnet_workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect solution or project files
        id: detect
        run: |
          if [ -n "$(find . -type f \( -name "*.sln" -o -name "*.csproj" \) -print -quit)" ]; then
            echo "has_dotnet_workspace=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dotnet_workspace=false" >> "$GITHUB_OUTPUT"
          fi

  codeql-analyze:
    needs: detect-dotnet-workspace
    if: needs.detect-dotnet-workspace.outputs.has_dotnet_workspace == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
      - run: dotnet build --configuration Release
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  scorecards:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
